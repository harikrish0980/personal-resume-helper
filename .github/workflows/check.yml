name: Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  web-check:
    name: Web app syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: personal-resume-helper-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run syntax checks
        run: npm run check
